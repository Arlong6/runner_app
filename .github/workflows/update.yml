name: 更新賽事行事曆

on:
  schedule:
    - cron: "0 20 * * *"   # 台灣 04:00
    - cron: "0 8 * * *"    # 台灣 16:00(一天兩次,持續更新)
  workflow_dispatch:        # 也可手動觸發

permissions:
  contents: write           # 允許 Action commit 回 repo

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 重新產生所有人的 .ics(你 + 朋友們)
        run: python3 runner_calendar.py --batch

      - name: 有變動就 commit
        run: |
          git add -- '*.ics' docs/races.json
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: 自動更新賽事行事曆"
            git push
          else
            echo "無變動,略過"
          fi
